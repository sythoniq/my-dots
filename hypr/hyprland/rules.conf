# Float and pin kitty
windowrule {
  name = terminal
  match:class = kitty
  float = on
  size = 1200 800
  center = on
}

# Float browser ig
windowrule {
  name = browser
  match:class = helium
  float = on
  size = 1600 1000
  center = on
}

# Float and pin PiP
windowrule {
  name = PiP
  match:title = ^(Picture-in-Picture)$
  float = on
  pin = on
  size = 800 450
  center = on
}

windowrule {
  name = Bluetooth
  match:class = blueman-manager
  float = on
  size = 900 500
}


windowrule {
  name = Sober
  match:class = ^(org.vinegarhq.Sober)$
  float = on
  size = 1560 980
}
